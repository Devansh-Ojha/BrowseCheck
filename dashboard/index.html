<!doctype html>
<!--
  BrowseCheck dashboard — minimalist, single file. OWNER: Person 2.
  Consumes GET /events (SSE). No build step (Tailwind via CDN + vanilla JS).
  Sections: site timeline, live hook feed (green pass / red block), threat tally,
  BLOCKED hero overlay, scorecard, Browserbase live-view iframe slot.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BrowseCheck</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-950 text-neutral-100 font-sans">
  <div class="max-w-7xl mx-auto p-6">
    <header class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold tracking-tight">BrowseCheck</h1>
        <p class="text-neutral-400 text-sm">Runtime security for AI browser agents — prevention, not observation.</p>
      </div>
      <div class="flex gap-2">
        <button onclick="post('/run/synthetic')" class="px-3 py-2 rounded-md bg-indigo-600 hover:bg-indigo-500 text-sm font-medium">Run demo (synthetic)</button>
        <button onclick="post('/scorecard/run')" class="px-3 py-2 rounded-md bg-neutral-800 hover:bg-neutral-700 text-sm font-medium">Compute scorecard</button>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <!-- Live browser view -->
      <section class="lg:col-span-2 rounded-xl border border-neutral-800 bg-neutral-900 p-4">
        <h2 class="text-sm uppercase tracking-wide text-neutral-400 mb-2">Live agent</h2>
        <div id="siteTimeline" class="flex flex-wrap gap-2 mb-3 text-xs"></div>
        <!-- TODO(P1): set iframe src to the Browserbase live-view URL -->
        <iframe id="liveView" class="w-full h-72 rounded-lg bg-black border border-neutral-800"
                title="Browserbase live view"></iframe>
      </section>

      <!-- Threat tally -->
      <section class="rounded-xl border border-neutral-800 bg-neutral-900 p-4">
        <h2 class="text-sm uppercase tracking-wide text-neutral-400 mb-3">Threats blocked</h2>
        <div id="tally" class="space-y-2 text-sm"></div>
      </section>
    </div>

    <!-- Live hook feed -->
    <section class="mt-4 rounded-xl border border-neutral-800 bg-neutral-900 p-4">
      <h2 class="text-sm uppercase tracking-wide text-neutral-400 mb-3">Live hook feed</h2>
      <div id="feed" class="space-y-1 text-sm font-mono max-h-80 overflow-y-auto"></div>
    </section>

    <!-- Scorecard -->
    <section class="mt-4 rounded-xl border border-neutral-800 bg-neutral-900 p-4">
      <h2 class="text-sm uppercase tracking-wide text-neutral-400 mb-3">Before / after scorecard</h2>
      <div id="scorecard" class="grid grid-cols-2 gap-4 text-sm"></div>
    </section>
  </div>

  <!-- BLOCKED hero overlay -->
  <div id="hero" class="fixed inset-0 hidden items-center justify-center bg-black/70 backdrop-blur-sm">
    <div class="bg-red-600 text-white rounded-2xl px-10 py-8 text-center shadow-2xl max-w-lg">
      <div class="text-5xl font-black tracking-tight">BLOCKED</div>
      <div id="heroHook" class="mt-2 text-lg font-semibold"></div>
      <div id="heroReason" class="mt-1 text-red-100"></div>
      <button onclick="hideHero()" class="mt-4 px-3 py-1.5 rounded-md bg-white/20 hover:bg-white/30 text-sm">dismiss</button>
    </div>
  </div>

<script>
const tally = {};
async function post(url){ try{ await fetch(url, {method:'POST'}); }catch(e){ console.error(e);} }
function hideHero(){ document.getElementById('hero').classList.add('hidden'); document.getElementById('hero').classList.remove('flex'); }
function showHero(hook, reason){
  document.getElementById('heroHook').textContent = hook || '';
  document.getElementById('heroReason').textContent = reason || '';
  const h = document.getElementById('hero');
  h.classList.remove('hidden'); h.classList.add('flex');
}

const seenSites = new Map();
function upsertSite(site, state){
  if(!site || !site.url) return;
  if(!seenSites.has(site.url)){
    const el = document.createElement('span');
    el.className = 'px-2 py-1 rounded-md border border-neutral-700 bg-neutral-800';
    el.textContent = site.label || site.domain || site.url;
    seenSites.set(site.url, el);
    document.getElementById('siteTimeline').appendChild(el);
  }
  const el = seenSites.get(site.url);
  if(state==='block'){ el.className='px-2 py-1 rounded-md border border-red-500 bg-red-900/40 text-red-200'; }
  else if(state==='pass'){ el.className='px-2 py-1 rounded-md border border-green-600 bg-green-900/30 text-green-200'; }
}

function addFeed(ev){
  const row = document.createElement('div');
  const t = new Date(ev.ts).toLocaleTimeString();
  let color = 'text-neutral-400';
  if(ev.kind==='hook-pass') color='text-green-400';
  if(ev.kind==='hook-block') color='text-red-400';
  const tag = ev.hook ? `[${ev.hook}]` : `[${ev.kind}]`;
  row.className = color;
  row.textContent = `${t} ${tag} ${ev.site?.domain||''} ${ev.decision||ev.kind} ${ev.reason?('— '+ev.reason):''}`;
  const feed = document.getElementById('feed');
  feed.prepend(row);
}

function renderTally(){
  const el = document.getElementById('tally');
  el.innerHTML = '';
  const entries = Object.entries(tally);
  if(!entries.length){ el.innerHTML = '<div class="text-neutral-500">none yet</div>'; return; }
  for(const [cat,n] of entries){
    const row = document.createElement('div');
    row.className='flex justify-between border-b border-neutral-800 pb-1';
    row.innerHTML = `<span class="capitalize">${cat}</span><span class="font-bold text-red-400">${n}</span>`;
    el.appendChild(row);
  }
}

function handle(ev){
  addFeed(ev);
  if(ev.kind==='hook-pass') upsertSite(ev.site,'pass');
  if(ev.kind==='hook-block'){
    upsertSite(ev.site,'block');
    tally[ev.category||'unknown'] = (tally[ev.category||'unknown']||0)+1;
    renderTally();
    showHero(ev.hook, ev.reason);
  }
}

const es = new EventSource('/events');
es.onmessage = (m)=>{ try{ handle(JSON.parse(m.data)); }catch(e){} };
es.onerror = ()=>{ /* SSE auto-reconnects */ };

async function loadScorecard(){
  try{
    const r = await fetch('/scorecard'); const d = await r.json();
    const el = document.getElementById('scorecard');
    const col = (title, data, accent)=>{
      const cats = Object.entries((data&&data.by_category)||{}).map(([c,n])=>`<li class="flex justify-between"><span class="capitalize">${c}</span><span>${n}</span></li>`).join('');
      return `<div class="rounded-lg border border-neutral-800 p-3">
        <div class="text-xs uppercase text-neutral-400">${title}</div>
        <div class="text-3xl font-black ${accent}">${(data&&data.total)||0}</div>
        <ul class="mt-2 space-y-1 text-neutral-300">${cats||'<li class=text-neutral-600>—</li>'}</ul></div>`;
    };
    el.innerHTML = col('Protection OFF — threats through', d['hooks-off'], 'text-red-400')
                 + col('Protection ON — threats blocked', d['hooks-on'], 'text-green-400');
  }catch(e){}
}
setInterval(loadScorecard, 3000); loadScorecard();
</script>
</body>
</html>
