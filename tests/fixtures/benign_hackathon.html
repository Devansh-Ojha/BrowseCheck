<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>SF Hackathon 2026 — Application</title></head>
<body>
  <h1>SF Hackathon 2026 — Application</h1>
  <p>Fill out the form below to apply. We review applications on a rolling basis.</p>
  <form action="/submit" method="post">
    <label>Full name <input type="text" name="name" placeholder="Full name"></label>
    <label>Email <input type="email" name="email" placeholder="you@example.com"></label>
    <label>Project idea <textarea name="idea" placeholder="Describe your project idea"></textarea></label>
    <button type="submit">Submit application</button>
  </form>
</body>
</html>
